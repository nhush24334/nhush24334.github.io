<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home page</title>
    <style>
        body {
            text-align: center;
            padding: 0;
            margin: 0;
            /*background-color: #f9f9f9;*/
            
            background: linear-gradient(135deg, #e0eafc, #cfdef3, #e2d1f9);
            background-attachment: fixed;
            min-height: 100vh;
            width: 100vw;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
        }   
        h1 {
            font-size: 35px;
            margin-bottom: 30px;
            color: #333;
        }
        h2 {
            font-size: 26px;
            margin-top: 10px;
            color: #444;
        }

        a {
            font-size: 18px;
            color: #d59708;
            transition: 0.4s;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
            /*background-color: #e3dede;*/
            padding: 10px 20px;
            border: 2px solid transparent;
            border-radius: 5px;
            background: rgba(255 ,255, 255, 0.3);
        }
        a:hover {
            color: rgb(187, 0, 0);
            /*text-decoration: underline;*/
            background-color: rgba(187, 0, 0, 0.05);
            border: 2px solid rgb(187, 0, 0);
            background: rgba(187, 0, 0, 0.1);
            transform: translateY(-2px);
        }   
        .main {
            /*border:2px solid black;*/
            border-radius: 25px;
            box-sizing: border-box;
            max-width: 800px;
            margin: 0 auto;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            padding: 50px;
            background: rgba(255, 255, 255, 0.4);

            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);

            border: 1px, solid rgba(255, 255, 255, 0.6);

            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
            
        }  
        .D1, .D2 {
            width: 100%;
        } 
        @media (max-width: 600px) {
            h1 {
                font-size: 24px;
            }
            h2 {
                font-size: 18px;
            }
            .main { 
                padding: 20px;
                width: 95%;
            }
        }
    </style>
</head>
<body>

</body>
</html>
